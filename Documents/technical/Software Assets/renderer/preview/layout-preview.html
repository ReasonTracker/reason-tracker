<title>Reason Tracker Layout Preview</title>
<style>
:root {
  --rt-font: 'IBM Plex Sans', 'Segoe UI', sans-serif;
  --rt-fg: #1f2937;
  --rt-muted: #6b7280;
  --rt-bg: #f3f4f6;
}
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--rt-font);
  color: var(--rt-fg);
  background: linear-gradient(160deg, #f8fafc 0%, var(--rt-bg) 100%);
}
main {
  height: 100vh;
  padding: 0.35rem 0.5rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}
h1 {
  margin: 0;
  font-size: 0.95rem;
  line-height: 1.05;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
p {
  margin: 0;
  font-size: 0.72rem;
  color: var(--rt-muted);
}
.rt-layout-stage {
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  border: 1px solid #d1d5db;
  border-radius: 0.75rem;
  background: gray;
}
.rt-layout-canvas {
  position: relative;
  background: gray;
}
.rt-edge-layer {
  position: absolute;
  inset: 0;
  overflow: visible;
  pointer-events: none;
}
.rt-edge {
  fill: none;
  stroke: #64748b;
  stroke-width: 2;
  stroke-linecap: butt;
}
.rt-edge[data-pro-target='true'] {
  stroke: #166534;
}
.rt-edge[data-pro-target='false'] {
  stroke: #991b1b;
}
.rt-edge[data-affects='relevance'] {
  stroke-dasharray: 6 5;
}
.rt-node {
  box-sizing: border-box;
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: center center;
  transform: translate(-50%, -50%) scale(var(--rt-node-scale, 1));
}
.rt-node-shell {
  position: absolute;
  overflow: visible;
}
.rt-node-body {
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  background: white;
  border: 1px solid #cbd5e1;
  border-radius: 0.5rem;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  padding: 0.5rem 0.75rem;
  overflow: auto;
}
.rt-node h2 {
  margin: 0;
  font-size: 1.9rem;
}
.rt-node small {
  display: block;
  margin-top: 0.35rem;
}
ul {
  list-style: none;
  padding: 0;
  display: grid;
  gap: 0.5rem;
}
li {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 0.5rem;
  padding: 0.5rem 0.75rem;
}
small {
  color: var(--rt-muted);
}
</style>
</head>
