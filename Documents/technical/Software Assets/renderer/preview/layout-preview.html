<meta charset="utf-8">

<title>Reason Tracker Layout Preview</title>
<link rel="stylesheet" href="../../website/site/css/brand.css">
<style>
:root {
  --rt-font: 'IBM Plex Sans', 'Segoe UI', sans-serif;
  --rt-fg: #1f2937;
  --rt-muted: #6b7280;
  --rt-bg: #000000;
  --rt-connector-opacity: 90%;
  --rt-connector-potential-opacity: 30%;
}
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--rt-font);
  color: var(--rt-fg);
  background: var(--rt-bg);
}
main {
  height: 100vh;
  padding: 0.35rem 0.5rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}
h1 {
  margin: 0;
  font-size: 0.95rem;
  line-height: 1.05;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
p {
  margin: 0;
  font-size: 0.72rem;
  color: var(--rt-muted);
}
.rt-layout-stage {
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  border: 1px solid #d1d5db;
  border-radius: 0.75rem;
  background: #000000;
}
.rt-layout-canvas {
  position: relative;
  background: #000000;
}
.rt-connector-layer {
  position: absolute;
  inset: 0;
  overflow: visible;
  pointer-events: none;
}
.rt-connector {
  fill: none;
  stroke: #64748b;
  opacity: var(--rt-connector-opacity);
  stroke-width: 2;
  stroke-linecap: butt;
}
.rt-connector.rt-connector-potential-confidence {
  opacity: var(--rt-connector-potential-opacity);
}
.rt-connector[data-connector-side='proMain'] {
  stroke: var(--pro);
}
.rt-connector[data-connector-side='conMain'] {
  stroke: var(--con);
}
.rt-connector[data-affects='relevance'] {
  stroke-dasharray: 6 5;
}
.rt-claim-shape {
  box-sizing: border-box;
  position: absolute;
  left: 50%;
  top: 50%;
  transform-origin: center center;
  transform: translate(-50%, -50%) scale(var(--rt-claim-shape-scale, 1));
}
.rt-claim-shape-shell {
  position: absolute;
  overflow: visible;
}
.rt-claim-shape-body {
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  background: #000000;
  color: #ffffff;
  border: 4px solid #cbd5e1;
  border-radius: 0;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  padding: 0.5rem 0.75rem;
  overflow: auto;
}
.rt-claim-shape-shell[data-claim-side='proMain'] .rt-claim-shape-body {
  border-color: var(--pro);
  background: hsl(var(--pro-h) 100% var(--pro-l) / var(--rt-connector-potential-opacity));
}
.rt-claim-shape-shell[data-claim-side='conMain'] .rt-claim-shape-body {
  border-color: var(--con);
  background: hsl(var(--con-h) 100% var(--con-l) / var(--rt-connector-potential-opacity));
}
.rt-claim-shape h2 {
  margin: 0;
  font-size: 1.9rem;
}
.rt-claim-shape small {
  display: block;
  margin-top: 0.35rem;
  color: #d1d5db;
}
small {
  color: var(--rt-muted);
}
</style>
</head>
